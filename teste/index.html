<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mapa Satélite Google Earth - OpenLayers</title>
    <!-- Importando CSS do OpenLayers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <style>
        #map { width: 100%; height: 500px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Importando JS do OpenLayers -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script>
        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.XYZ({
                        // 'lyrs=s' indica o mapa de satélite (Google Earth)
                        // 'lyrs=y' pode ser usado para satélite com etiquetas (híbrido)
                        url: 'https://mt{0-3}://{x}&y={y}&z={z}',
                        attributions: '© Google'
                    })
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([-41.93, -22.52]), // Exemplo: Rio das Ostras
                zoom: 12
            })
        });
    </script>
</body>
</html>
