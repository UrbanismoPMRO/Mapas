<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa OpenLayers - Satélite e GeoJSON</title>
    
    <!-- Importando CSS do OpenLayers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Importando JS do OpenLayers -->
    <script src="https://cdn.jsdelivr.net"></script>

    <script>
        // 1. Camada de Satélite do Google Maps
        const googleSatellite = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: 'https://mt1.google.com{x}&y={y}&z={z}',
                attributions: '© Google'
            })
        });

        // 2. Camada para o arquivo GeoJSON
        const geojsonLayer = new ol.layer.Vector({
            source: new ol.source.Vector({
                url: 'lotes_hist.geojson', // Nome do seu arquivo
                format: new ol.format.GeoJSON()
            }),
            style: new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: '#ffcc33', // Cor da borda do polígono
                    width: 2
                }),
                fill: new ol.style.Fill({
                    color: 'rgba(255, 255, 255, 0.2)' // Preenchimento transparente
                })
            })
        });

        // 3. Inicialização do Mapa
        const map = new ol.Map({
            target: 'map',
            layers: [googleSatellite, geojsonLayer],
            view: new ol.view.View({
                center: ol.proj.fromLonLat([-46.6333, -23.5505]), // Coordenadas Iniciais (SP por padrão)
                zoom: 12
            })
        });

        // Ajustar zoom automaticamente para os polígonos quando carregar
        geojsonLayer.getSource().on('addfeature', function() {
            const extent = geojsonLayer.getSource().getExtent();
            map.getView().fit(extent, { padding: [50, 50, 50, 50], duration: 1000 });
        });
    </script>
</body>
</html>
