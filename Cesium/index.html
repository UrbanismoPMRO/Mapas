<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/botoes.css">
  <link rel="stylesheet" href="./css/download_lotes.css">

</head>

<body>

  <!-- A-novos parametrso do script do claude sobre conversão dxf / geojson -->
  <div id="upload-bar">
    <label>
      📂 Importar .dxf
      <input type="file" id="dxf-input" accept=".dxf">
    </label>
    <span id="file-name">Nenhum arquivo carregado</span>
    <button id="clear-btn" onclick="clearImported()">✕ Remover</button>
    <div id="toast">⬇️ Download iniciado!</div>

  </div>

  <div id="map-tooltip"></div>
  <div id="toast">⬇️ Download iniciado!</div>

  <!-- A-fim -->


  <div id="cesiumContainer"></div>
  
  <!-- <button id="btnCarregaEdificacao">Carregar Edificação</button> -->
<div id="frmBotoes">
  <button id="btn3D">🧊</button>
  <button id="btnVistaSuperior">&#x025AD;</button>
<button id="btnCarregaArquivo">📂</button>
</div>

  <div id="frmMedicoes">
    <button id="btnMedir">📏</button>
    <button id="btnDesligarMedir">🛑</button>
    <button id="btnMedirApagar">🗑️</button>
  </div>

  <!--<button id="btnTeste">Teste</button> -->
  <!-- <button id="btnCarregarModelo3D">Carregar Modelo 3D</button>  -->
  
  <input type="file" id="inputArquivo" accept=".geojson,.kml,.json" style="display: none;">

    <div id="frmControles">
      <p>Cota de Soleira</p><input type="number" id="boxCotaSoleira" placeholder="Altura" value="0"
        step="1"><br>
      Altura Edificação</br><input type="number" id="boxAlturaEdif" placeholder="Altura" value="0" step="1"><br>
      Cota Máxima<br>
      
      <label for="lblCotaMaxima"></label>
    <input type="text" id="lblCotaMaxima" name="nomeUsuario">


    </div>

    <div id="frmMarcoAstronomico">
      Marco Astronômico<br>
      <input type="range" id="sliderMarcoAstronomico" min="1" max="9" value="0">
      <p id="labelMarco">Selecione</p>
    </div>

    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/index.js"></script>
    <script type="module" src="js/importaDXF.js"></script>

</body>

</html>
