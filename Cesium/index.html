<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.140/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css"> 
  <link rel="stylesheet" href="./css/botoes.css">

</head>

<body>
  <div id="cesiumContainer"></div>
<div id="measureContainer"></div>
  <button id="btnCarregaEdificacao">Carregar Edificação</button>
  <button id="btn3D">3D</button>
  <button id="btn2D">2D</button>
  <button id="btnVistaSuperior">Visão Superior</button>
  <button id="btnMedir">Medir</button>
  <button id="btnDesligarMedir">Parar</button>
  <button id="btnMedirApagar">Apagar</button>
  <button id="btnTeste">Teste</button>
  <button id="btnCarregaArquivo">Carregar Arquivo</button>
  <input type="file" id="inputArquivo" accept=".geojson,.kml,.json" style="display: none;">
  <--Menu de controle-->
    <div id="frmControles">
      <p>Cota máxima</p><input type="number" id="boxAlturaEdif" placeholder="Altura" value="0" step="1"><br>
      <p>Marco Astronômico</p>
      <input type="range" id="sliderMarcoAstronomico" min="1" max="9" value="0">
      <p id="labelMarco">Selecione</p>
    </div>

    <script type="module" src="js/index.js"></script>
</body>

</html>
