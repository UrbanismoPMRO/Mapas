<!-- A-novos parametrso do script do claude sobre conversão dxf / geojson -->

    <label>
      📂 Importar .dxf
      <input type="file" id="dxf-input" accept=".dxf">
    </label>
    <span id="file-name">Nenhum arquivo carregado</span>
    <button id="clear-btn" onclick="clearImported()">✕ Remover</button>
  <div id="toast">⬇️ Download iniciado!</div>

   <div id="map-tooltip"></div>

<!-- A-fim -->


  <div id="cesiumContainer"></div>
  <div id="measureContainer"></div>
  <!-- <button id="btnCarregaEdificacao">Carregar Edificação</button> -->
  <button id="btn3D">3D</button>
  <button id="btnVistaSuperior">Vista Superior</button>
  <button id="btnMedir">Medir</button>
  <button id="btnDesligarMedir">Parar</button>
  <button id="btnMedirApagar">Apagar</button>

  <--Menu de controle-->
    <div id="frmControles">
      <p>Cota de soleira do projeto</p><input type="number" id="boxCotaSoleira" placeholder="Altura" value="0"

      <br>Altura Edificação</br><input type="number" id="boxAlturaEdif" placeholder="Altura" value="0" step="1"><br>
      <br>Marco Astronômico</br>
      <input type="range" id="sliderMarcoAstronomico" min="1" max="9" value="0">
      <p id="labelMarco">Selecione</p>
    </div>
